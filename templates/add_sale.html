{% extends "base.html" %}
{% block title %}New Sale{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><h5 class="mb-0 fw-bold"><i class="bi bi-cart-plus"></i> Record Sale</h5></div>
            <div class="card-body">
                <form method="POST" id="saleForm">
                    <div class="mb-3">
                        <label class="form-label">Product *</label>
                        <select name="product_id" class="form-select" id="productSelect" required>
                            <option value="">Select product...</option>
                            {% for p in products %}
                            <option value="{{ p.id }}" data-price="{{ p.selling_price }}" data-buy="{{ p.buying_price }}" data-qty="{{ p.quantity }}">
                                {{ p.title }} (Stock: {{ p.quantity }}, Price: GHS {{ "{:,.2f}".format(p.selling_price) }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantity *</label>
                        <input type="number" name="quantity" class="form-control" id="qtyInput" value="1" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Unit Price (GHS) *</label>
                        <input type="number" step="0.01" name="unit_price" class="form-control" id="priceInput" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Customer Name</label>
                        <input type="text" name="customer_name" class="form-control" placeholder="Optional">
                    </div>
                    <div class="alert alert-info" id="preview">
                        Total: GHS 0.00 | Profit: GHS 0.00
                    </div>
                    <button type="submit" class="btn btn-dark w-100"><i class="bi bi-check-lg"></i> Record Sale</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    function updatePreview() {
        const sel = document.getElementById('productSelect');
        const qty = parseInt(document.getElementById('qtyInput').value) || 0;
        const price = parseFloat(document.getElementById('priceInput').value) || 0;
        const opt = sel.options[sel.selectedIndex];
        if (opt && opt.value) {
            const buy = parseFloat(opt.dataset.buy) || 0;
            const total = price * qty;
            const profit = (price - buy) * qty;
            document.getElementById('preview').innerHTML = `Total: GHS ${total.toFixed(2)} | Profit: GHS ${profit.toFixed(2)}`;
        }
    }
    document.getElementById('productSelect').addEventListener('change', function() {
        const opt = this.options[this.selectedIndex];
        if (opt && opt.value) document.getElementById('priceInput').value = opt.dataset.price;
        updatePreview();
    });
    document.getElementById('qtyInput').addEventListener('input', updatePreview);
    document.getElementById('priceInput').addEventListener('input', updatePreview);
</script>
{% endblock %}
