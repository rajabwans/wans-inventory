{% extends "base.html" %}
{% block title %}Edit Product{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><h5 class="mb-0 fw-bold"><i class="bi bi-pencil"></i> Edit Product</h5></div>
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Title *</label>
                            <input type="text" name="title" class="form-control" value="{{ product.title }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Author</label>
                            <input type="text" name="author" class="form-control" value="{{ product.author or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ISBN</label>
                            <input type="text" name="isbn" class="form-control" value="{{ product.isbn or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Publisher</label>
                            <input type="text" name="publisher" class="form-control" value="{{ product.publisher or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select">
                                <option value="">Select category...</option>
                                <option {% if product.category == 'Perfumes' %}selected{% endif %}>Perfumes</option>
                                <option {% if product.category == 'Scented Oils' %}selected{% endif %}>Scented Oils</option>
                                <option {% if product.category == 'Toys' %}selected{% endif %}>Toys</option>
                                <option {% if product.category == 'Womens Bags' %}selected{% endif %}>Womens Bags</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Quantity *</label>
                            <input type="number" name="quantity" class="form-control" value="{{ product.quantity }}" min="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Buying Price ({{ CURRENCY }}) *</label>
                            <input type="number" step="1" name="buying_price" class="form-control" value="{{ product.buying_price }}" min="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Selling Price ({{ CURRENCY }}) *</label>
                            <input type="number" step="1" name="selling_price" class="form-control" value="{{ product.selling_price }}" min="0" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Notes</label>
                            <textarea name="notes" class="form-control" rows="2">{{ product.notes or '' }}</textarea>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-dark"><i class="bi bi-check-lg"></i> Update Product</button>
                        <a href="{{ url_for('products') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
